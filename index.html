<!-- This project for my create task is a Student Gradebook web 
 application that is designed to help users track and calculate 
 how they are doing in a class. 
 It allows students to enter grades and weight distributions for 
 different cateogries such as homework, quizzes, tests, projects, 
 and final exams. The system is built to calculate a weighted final 
 grade and it also includes a GPA 
 calculator that converts the percentage into the 4.0 scale to give an overall academic summary. 
 Overall, the goal of this project is to create a tool that 
 simplifies grade tracking and performance evaluation.  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gradebook</title>
    <script src="script.js" defer></script>
</head>

<body>
    <h1>Gradebook</h1>

    <input id="category" placeholder="Category (hw, quiz, test, proj)">
    <input id="weight" type="number" placeholder="Weight %">
    <input id="grade" type="number" placeholder="Grade (0-100)">

    <button id="addBtn">Add</button>
    <button id="calcBtn">Calculate</button>

    <p id="output"></p>
</body>
</html>
