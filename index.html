<!-- This project for my create task is a Student Gradebook web 
 application that is designed to help users track and calculate 
 how they are doing in a class. 
 It allows students to enter grades and weight distributions for 
 different cateogries such as homework, quizzes, tests, projects, 
 and final exams. The system is built to calculate a weighted final 
 grade and it also includes a GPA 
 calculator that converts the percentage into the 4.0 scale to give an overall academic summary. 
 Overall, the goal of this project is to create a tool that 
 simplifies grade tracking and performance evaluation. I later added 
 a bunch of other cool features, with my aim to resemble the student view
 of an advanced gradebook like Aeries. -->
 

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grade Portal</title>
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
</head>

<body>

<!-- SETUP SCREEN -->
<div id="setupScreen" class="setupScreen">
    <h1>Grade Portal</h1>

    <p>How many classes do you have?</p>

    <input id="classCount" type="number" min="1" max="8">

    <button onclick="startSetup()">Continue</button>

    <!-- NEW BUTTON (starts hidden) -->
    <button id="goBtn" onclick="goToGradebook()" style="display:none;">
        Done with entering my classes. Go to Gradebook
    </button>
</div>

<!-- GRADEBOOK -->
<div id="app" class="hidden">

    <div class="topBar">
        <h1>Gradebook</h1>

        <div>
            Unweighted GPA: <span id="uwGPA">--</span> |
            Weighted GPA: <span id="wGPA">--</span>
        </div>

        <button onclick="toggleDark()">Dark Mode</button>
    </div>

    <div class="layout">

        <div class="sidebar">
            <h3>Classes</h3>
            <div id="classList"></div>
        </div>

        <div class="main">

            <h2 id="activeClassTitle"></h2>
            <div id="classGrade"></div>

            <div class="panel">
                <input id="assignmentName" placeholder="Assignment">

                <select id="category">
                    <option>Homework</option>
                    <option>Quizzes</option>
                    <option>Tests</option>
                    <option>Projects</option>
                    <option>Labs</option>
                </select>

                <input id="earned" placeholder="Earned">
                <input id="possible" placeholder="Possible">

                <button onclick="addAssignment()">Add</button>
            </div>

            <div class="panel">
                <button onclick="calculate()">Calculate</button>
                <div id="gradeOutput"></div>
            </div>

        </div>
    </div>
</div>

<canvas id="confetti"></canvas>

</body>
</html>
