<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradebook Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section id="setupScreen">
      <h1>Gradebook Setup</h1>
      <div class="prompt">
        <label for="numClasses">How many classes do you have?</label>
        <input id="numClasses" type="number" min="1" placeholder="Enter number of classes" />
      </div>
      <button id="continueBtn">Continue</button>
      <div id="classInputs" class="class-input-grid"></div>
    </section>

    <section id="categoriesScreen" class="hidden">
      <h1>Set Up Grade Components for Each Class</h1>
      <p class="subtitle">Example: Labs, Homework, Quizzes, Exams, Projects, Participation</p>
      <div id="categorySetupContainer"></div>
      <button id="finishCategoriesBtn">Continue to Grades</button>
    </section>

    <section id="gradebook" class="hidden">
      <header class="gradebook-header">
        <div class="header-left">
          <button id="darkModeToggle">Toggle Dark Mode</button>
          <button id="resetBtn">Reset</button>
        </div>
        <div class="gpa-summary">
          <div id="gpaOutput">GPA: 0.00</div>
          <div id="unweightedOutput">Unweighted GPA: 0.00</div>
        </div>
      </header>

      <section id="classesContainer" class="classes-grid"></section>

      <div id="output" class="output-box">Enter your grade component scores to calculate.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
