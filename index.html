<!-- This project for my create task is a Student Gradebook web 
 application that is designed to help users track and calculate 
 how they are doing in a class. 
 It allows students to enter grades and weight distributions for 
 different cateogries such as homework, quizzes, tests, projects, 
 and final exams. The system is built to calculate a weighted final 
 grade and it also includes a GPA 
 calculator that converts the percentage into the 4.0 scale to give an overall academic summary. 
 Overall, the goal of this project is to create a tool that 
 simplifies grade tracking and performance evaluation. I later added 
 a bunch of other cool features, with my aim to resemble the student view
 of an advanced gradebook like Aeries. -->
 
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grade Portal</title>

<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
</head>

<body>

<!-- SETUP -->
<div id="setupScreen" class="setup">
    <h1>Grade Portal</h1>

    <input id="classCount" type="number" placeholder="Number of classes">
    <button onclick="startSetup(); clickFX(this)">Start</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <!-- HEADER -->
    <div class="header">
        <h1>Grade Portal</h1>

        <button onclick="toggleMode(); clickFX(this)">
            Toggle Dark/Light
        </button>
    </div>

    <div id="errorBox" class="errorBox hidden"></div>

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h3>Classes</h3>
            <div id="classList"></div>
        </div>

        <!-- CENTER -->
        <div class="center">

            <h2 id="activeClassTitle"></h2>

            <!-- GPA -->
            <div class="gpaContainer">
                <div class="gpaCard">
                    <h3>Unweighted GPA</h3>
                    <div id="uwGPA">--</div>
                </div>

                <div class="gpaCard">
                    <h3>Weighted GPA</h3>
                    <div id="wGPA">--</div>
                </div>
            </div>

            <!-- WEIGHTS (NOW ABOVE INPUT) -->
            <div class="panel">
                <h3>Category Weights (%)</h3>

                <input id="hwW" placeholder="Homework">
                <input id="quizW" placeholder="Quizzes">
                <input id="testW" placeholder="Tests">
                <input id="projW" placeholder="Projects">
                <input id="labW" placeholder="Labs">
            </div>

            <!-- ADD -->
            <div class="panel">
                <input id="assignmentName" placeholder="Assignment">
                <select id="category">
                    <option>Homework</option>
                    <option>Quizzes</option>
                    <option>Tests</option>
                    <option>Projects</option>
                    <option>Labs</option>
                </select>

                <input id="earned" placeholder="Earned">
                <input id="possible" placeholder="Possible">

                <button onclick="addAssignment(); clickFX(this)">Add</button>
            </div>

            <!-- CALC -->
            <div class="panel">
                <button onclick="calculate(); clickFX(this)">Calculate</button>
                <div id="gradeOutput"></div>
            </div>

            <!-- WHAT IF -->
            <div class="panel">
                <h3>What If</h3>

                <input id="whatPercent" placeholder="Desired %">
                <input id="whatPossible" placeholder="Points">

                <button onclick="whatIf(); clickFX(this)">Simulate</button>
                <div id="whatResult"></div>
            </div>

        </div>

    </div>
</div>

<canvas id="confetti"></canvas>

</body>
</html>
